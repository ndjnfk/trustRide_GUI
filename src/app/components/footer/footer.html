  <!-- Desktop Bottom Bar -->
  <div class="footer__bottom d-none d-lg-block">
    <div class="footer__bottom-inner container d-flex align-items-center justify-content-between gap-3">
      
      <!-- Logo -->
      <a class="footer__brand d-inline-flex align-items-center gap-2 text-decoration-none" routerLink="/">
        <span class="footer__brand-name">
          <span class="header__brand-accent">Trust <span class="logo_color2">RideSRE</span></span>
        </span>
      </a>

      <!-- Copyright -->
      <p class="footer__copyright mb-0">
        &copy; {{ currentYear }} <a href="https://trustridesre.com/">TrustRideSRE</a>. All rights reserved.
      </p>

      <!-- Links -->
      <ul class="footer__legal-links list-unstyled d-flex flex-wrap gap-3 mb-0">
        <li *ngFor="let link of links.product">
          <a class="footer__link" [routerLink]="link.route">{{ link.label }}</a>
        </li>
      </ul>

    </div>
  </div>

  <!-- Mobile / Tablet Bottom Navigation -->
   
  <nav class="footer__mobile-nav d-lg-none" aria-label="Mobile navigation">
  <ng-container *ngFor="let item of mobileNavItems">

    <!-- ── INBOX: External WhatsApp link (href) ── -->
    <a *ngIf="item.key === 'inbox' && isLoggedIn"
       [href]="item.route"
       target="_blank"
       rel="noopener"
       class="footer__mobile-nav-item">
      <span class="footer__mobile-nav-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
        </svg>
      </span>
      <span class="footer__mobile-nav-label">{{ item.label }}</span>
    </a>

    <!-- ── BAAKI ITEMS: Internal routes (routerLink) ── -->
    <a *ngIf="item.key !== 'inbox' && (isLoggedIn || item.key === 'search')"
       [routerLink]="item.route"
       routerLinkActive="footer__mobile-nav-item--active"
       class="footer__mobile-nav-item">
      <span class="footer__mobile-nav-icon" *ngIf="item.key !== 'profile'">
        <!-- Search -->
        <svg *ngIf="item.key === 'search'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="11" cy="11" r="7"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <!-- Publish -->
        <svg *ngIf="item.key === 'publish'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="9"/>
          <line x1="12" y1="8" x2="12" y2="16"/>
          <line x1="8" y1="12" x2="16" y2="12"/>
        </svg>
        <!-- Your rides -->
        <svg *ngIf="item.key === 'rides'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M5 17h14l-1.5-5.5a2 2 0 0 0-1.93-1.5H8.43a2 2 0 0 0-1.93 1.5L5 17z"/>
          <circle cx="7.5" cy="17.5" r="1.5"/>
          <circle cx="16.5" cy="17.5" r="1.5"/>
        </svg>
      </span>
      <span class="footer__mobile-nav-avatar" *ngIf="item.key === 'profile'">
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M12 12a5 5 0 1 0-5-5 5 5 0 0 0 5 5zm0 2c-3.33 0-10 1.67-10 5v3h20v-3c0-3.33-6.67-5-10-5z"/>
        </svg>
      </span>
      <span class="footer__mobile-nav-label">{{ item.label }}</span>
    </a>

  </ng-container>
</nav>
</footer>
