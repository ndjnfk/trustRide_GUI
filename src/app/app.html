
<!-- Admin Route Header -->
<app-header *ngIf="!isAdminRoute"></app-header>

@if (loader.loading$ | async) {
  <div class="app-loader-overlay">
    <div class="app-loader-spinner"></div>
  </div>
}
<router-outlet></router-outlet>

<!-- Floating cart button — only on the marketplace storefront -->
<app-cart-fab *ngIf="isMarketplaceRoute"></app-cart-fab>


<app-footer *ngIf="!isAdminRoute"></app-footer>
